name: TI Catalog Universe Ingest (Phase 23C.3)

# Manual-trigger only. Two operating modes:
#
#   1. Real catalog (default)  — Fetches the TI full catalog ONCE per run,
#      parses the ~50MB JSON in this runner, splits it into chunks (default
#      200), and POSTs each chunk to the Worker. Workflow fails red if any
#      chunk fails OR if cumulative opnRowsUpserted < parsedProducts.
#
#   2. Synthetic test_mode    — Skips OAuth + the rate-limited TI catalog
#      fetch entirely; sends ONE chunk of synthetic products to the
#      Worker. Used to verify the D1 micro-batch writer without burning
#      catalog quota. The dispatcher picks this with input
#      `test_mode = synthetic_chunk`.
#
# Why GitHub Actions and not a Worker invocation:
#   - The Cloudflare Worker memory cap (~128MB) makes parsing 50MB JSON
#     in-Worker tight. GH Actions runners have 7GB RAM.
#   - The TI catalog endpoint is rate-limited; one fetch per run keeps
#     us inside quota.
#   - Per-chunk Worker calls touch only ~200 products per invocation,
#     well inside D1 micro-batch and subrequest budgets.
#
# Required GitHub Actions repository secrets:
#   TI_CLIENT_ID            — TI developer-portal app client id
#   TI_CLIENT_SECRET        — same app's client secret
#   SNAPSHOT_CAPTURE_SECRET — same secret used by ti-inventory-capture.yml
#                             and the Cloudflare Pages env var
#
# Phase 23C.3 changes:
#   - Default chunk_size lowered from 500 → 200 (D1 micro-batch headroom).
#   - Hard fail on any chunk failure or short-write detected via diagnostics.
#   - Post-status validation: opnCount must equal parsedProducts; gpnCount,
#     pricedOpnCount, and inStockOpnCount + outOfStockOpnCount sanity checks.
#   - Synthetic test_mode path that requires no TI quota.

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Operating mode: real_catalog (default) or synthetic_chunk (no TI fetch).'
        required: false
        default: 'real_catalog'
        type: choice
        options:
          - real_catalog
          - synthetic_chunk
      confirm_catalog_quota_available:
        description: 'For real_catalog ONLY: type YES to acknowledge TI catalog quota (1/4h, 6/day). Ignored in synthetic_chunk mode.'
        required: false
        default: 'NO'
      chunk_size:
        description: 'Products per chunk POSTed to Worker (default 200; Phase 23C.3 lowered from 500).'
        required: false
        default: '200'
      synthetic_chunk_size:
        description: 'For synthetic_chunk mode: how many synthetic products to send in the single test chunk (default 25).'
        required: false
        default: '25'
      dry_run:
        description: 'real_catalog only: skip the Worker POSTs; only parse + report.'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: ti-catalog-universe-ingest
  cancel-in-progress: false

env:
  BASE_URL: https://texas-instruments-dashboard-final.pages.dev
  TI_TOKEN_URL: https://transact.ti.com/v1/oauth/accesstoken
  TI_CATALOG_URL: https://transact.ti.com/v2/store/products/catalog

jobs:
  ingest:
    name: Fetch + chunk + POST chunked catalog ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Quota acknowledgment gate (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' }}
        env:
          CONFIRM: ${{ inputs.confirm_catalog_quota_available }}
        run: |
          # TI's /v2/store/products/catalog endpoint is officially
          # rate-limited to 1 call every 4 hours and 6 calls per day.
          # The probe (Phase 23B), the experimental capture (Phase 23C),
          # and this workflow ALL consume the same quota. We require an
          # explicit operator acknowledgment so a casual re-run can't
          # silently burn the next 4-hour window. synthetic_chunk mode
          # skips this gate because it never calls TI.
          if [ "${CONFIRM}" != "YES" ]; then
            echo "::error::Workflow input confirm_catalog_quota_available must be set to YES for real_catalog mode."
            echo ""
            echo "TI /v2/store/products/catalog quota: 1 call every 4 hours, 6 calls per day."
            echo "The catalog probe + capture endpoints share the same quota."
            echo ""
            echo "Before re-running:"
            echo "  1. Confirm at least 4 hours have passed since the last catalog fetch"
            echo "     attempt (probe, capture, or this workflow). 24 hours is safer."
            echo "  2. Confirm no concurrent catalog fetch is in flight."
            echo "  3. Re-dispatch with confirm_catalog_quota_available = YES."
            echo "  4. Or pick test_mode = synthetic_chunk to verify the writer without quota."
            exit 1
          fi
          echo "Quota acknowledged. Proceeding."

      - name: Validate required secrets are configured
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          TI_CLIENT_ID: ${{ secrets.TI_CLIENT_ID }}
          TI_CLIENT_SECRET: ${{ secrets.TI_CLIENT_SECRET }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: |
          if [ -z "${CAPTURE_SECRET:-}" ]; then
            echo "::error::Repo secret SNAPSHOT_CAPTURE_SECRET is not set."
            exit 1
          fi
          if [ "${TEST_MODE}" != "synthetic_chunk" ]; then
            if [ -z "${TI_CLIENT_ID:-}" ]; then
              echo "::error::Repo secret TI_CLIENT_ID is not set. Add it under: Settings → Secrets and variables → Actions → New repository secret."
              exit 1
            fi
            if [ -z "${TI_CLIENT_SECRET:-}" ]; then
              echo "::error::Repo secret TI_CLIENT_SECRET is not set."
              exit 1
            fi
            echo "All three secrets are configured (values not printed)."
          else
            echo "synthetic_chunk mode — only SNAPSHOT_CAPTURE_SECRET is required (it is set)."
          fi

      # ──────────────────────────────────────────────────────────────────────
      # synthetic_chunk path — no TI OAuth, no TI catalog fetch.
      # ──────────────────────────────────────────────────────────────────────

      - name: Generate synthetic chunk (test_mode only)
        if: ${{ inputs.test_mode == 'synthetic_chunk' }}
        id: synth
        env:
          SYNTH_COUNT: ${{ inputs.synthetic_chunk_size }}
        run: |
          set -uo pipefail
          mkdir -p artifacts/chunks
          python3 - <<'PY'
          import json, os, uuid, datetime
          n = int(os.environ.get('SYNTH_COUNT') or '25')
          run_id = str(uuid.uuid4())
          captured_at = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.000Z')
          # Synthetic product shape mirrors what parseProduct() expects.
          # Use a clear "PHASE23C3SYNTH" namespace so test rows are obviously
          # delete-able later (DELETE FROM ti_catalog_latest_opn WHERE
          # ti_part_number LIKE 'PHASE23C3SYNTH-%').
          products = []
          for i in range(n):
              products.append({
                  'tiPartNumber': f'PHASE23C3SYNTH-OPN-{i:04d}',
                  'genericPartNumber': f'PHASE23C3SYNTH-GPN-{i // 5:04d}',
                  'description': f'Synthetic Phase 23C.3 D1-writer test row {i}',
                  'quantity': 100 + i,
                  'pricing': [{
                      'priceBreaks': [
                          {'priceBreakQuantity': 1, 'price': 1.23 + i * 0.01},
                          {'priceBreakQuantity': 100, 'price': 0.99 + i * 0.005},
                      ],
                  }],
                  'minimumOrderQuantity': 1,
                  'standardPackQuantity': 1,
                  'lifeCycle': 'ACTIVE',
                  'buyNowUrl': None,
              })
          payload = {
              'runId': run_id,
              'capturedAt': captured_at,
              'chunkIndex': 0,
              'totalChunks': 1,
              'products': products,
          }
          with open('artifacts/chunks/chunk_0000.json', 'w') as out:
              json.dump(payload, out)
          with open('artifacts/run_meta.json', 'w') as out:
              json.dump({
                  'runId': run_id,
                  'capturedAt': captured_at,
                  'chunkSize': n,
                  'totalChunks': 1,
                  'totalProducts': n,
                  'mode': 'synthetic_chunk',
              }, out, indent=2)
          print(f'Wrote 1 synthetic chunk with {n} products.')
          PY
          run_id=$(jq -r .runId artifacts/run_meta.json)
          captured_at=$(jq -r .capturedAt artifacts/run_meta.json)
          synth_count=$(jq -r .totalProducts artifacts/run_meta.json)
          echo "run_id=${run_id}"          >> "$GITHUB_OUTPUT"
          echo "captured_at=${captured_at}" >> "$GITHUB_OUTPUT"
          echo "synth_count=${synth_count}" >> "$GITHUB_OUTPUT"

      - name: Verify 401 without capture secret (test_mode only)
        if: ${{ inputs.test_mode == 'synthetic_chunk' }}
        run: |
          set -uo pipefail
          http_code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            --data-binary "@artifacts/chunks/chunk_0000.json" \
            "${BASE_URL}/api/ti/universe/catalog/ingest-chunk")"
          if [ "${http_code}" != "401" ]; then
            echo "::error::Auth bypass smoke-test failed: expected 401 without X-Capture-Secret, got ${http_code}."
            exit 1
          fi
          echo "Auth gate confirmed: 401 returned when X-Capture-Secret is absent."

      - name: POST synthetic chunk + assert diagnostics (test_mode only)
        if: ${{ inputs.test_mode == 'synthetic_chunk' }}
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          SYNTH_COUNT: ${{ steps.synth.outputs.synth_count }}
        run: |
          set -uo pipefail
          response_file="$(mktemp)"
          http_code="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "X-Capture-Secret: ${CAPTURE_SECRET}" \
            -H 'Content-Type: application/json' \
            --data-binary "@artifacts/chunks/chunk_0000.json" \
            "${BASE_URL}/api/ti/universe/catalog/ingest-chunk")"
          echo "ingest-chunk HTTP ${http_code}"
          jq -c '{success, runId, chunkIndex, attempted, opnRowsUpserted, sqlStatementsExecuted, paramsPerRow, rowsPerStatement, errorsLen: (.errors // [] | length), subBatchErrorsLen: (.subBatchErrors // [] | length)}' < "$response_file"

          if [ "${http_code}" != "200" ]; then
            echo "::error::Synthetic chunk POST returned HTTP ${http_code}. Body:"
            head -c 500 "$response_file" || true
            exit 1
          fi
          success=$(jq -r '.success // false' < "$response_file")
          attempted=$(jq -r '.attempted // 0' < "$response_file")
          upserted=$(jq -r '.opnRowsUpserted // 0' < "$response_file")
          rps=$(jq -r '.rowsPerStatement // 0' < "$response_file")
          ppr=$(jq -r '.paramsPerRow // 0' < "$response_file")
          stmts=$(jq -r '.sqlStatementsExecuted // 0' < "$response_file")
          sub_errs=$(jq -r '(.subBatchErrors // []) | length' < "$response_file")

          fail=0
          if [ "${success}" != "true" ];        then echo "::error::success != true";                              fail=1; fi
          if [ "${attempted}" != "${SYNTH_COUNT}" ]; then echo "::error::attempted=${attempted} != ${SYNTH_COUNT}"; fail=1; fi
          if [ "${upserted}" != "${SYNTH_COUNT}" ];  then echo "::error::opnRowsUpserted=${upserted} != ${SYNTH_COUNT}"; fail=1; fi
          if [ "${sub_errs}" != "0" ];          then echo "::error::subBatchErrors=${sub_errs} (expected 0)";        fail=1; fi
          if [ "${rps}" -le 0 ] || [ "${rps}" -gt 5 ]; then echo "::error::rowsPerStatement=${rps} not in (0, 5]";   fail=1; fi
          if [ "${ppr}" -le 0 ];                then echo "::error::paramsPerRow=${ppr} (expected > 0)";             fail=1; fi
          if [ "${stmts}" -le 0 ];              then echo "::error::sqlStatementsExecuted=${stmts} (expected > 0)";  fail=1; fi
          # Sanity: stmts should be ceil(attempted / rowsPerStatement).
          expected_stmts=$(( (SYNTH_COUNT + rps - 1) / rps ))
          if [ "${stmts}" != "${expected_stmts}" ]; then
            echo "::warning::sqlStatementsExecuted=${stmts} differs from ceil(${SYNTH_COUNT}/${rps})=${expected_stmts}; investigate."
          fi
          if [ "${fail}" = "1" ]; then
            echo "::error::Synthetic chunk diagnostics did not match expectations. See body:"
            jq . < "$response_file" || head -c 500 "$response_file"
            exit 1
          fi
          echo "Synthetic chunk diagnostics OK: ${SYNTH_COUNT} rows in ${stmts} statements (${rps} rows/stmt, ${ppr} params/row)."

      # ──────────────────────────────────────────────────────────────────────
      # real_catalog path — TI OAuth + full catalog fetch.
      # ──────────────────────────────────────────────────────────────────────

      - name: Fetch TI OAuth token (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' }}
        id: token
        env:
          TI_CLIENT_ID: ${{ secrets.TI_CLIENT_ID }}
          TI_CLIENT_SECRET: ${{ secrets.TI_CLIENT_SECRET }}
        run: |
          set -uo pipefail
          token_resp="$(mktemp)"
          http_code="$(curl -sS -o "$token_resp" -w '%{http_code}' \
            -X POST -H 'Content-Type: application/x-www-form-urlencoded' \
            -d "grant_type=client_credentials&client_id=${TI_CLIENT_ID}&client_secret=${TI_CLIENT_SECRET}" \
            "${TI_TOKEN_URL}")"
          if [ "${http_code}" != "200" ]; then
            echo "::error::TI OAuth token endpoint returned HTTP ${http_code}"
            jq -c '{error, error_description, status}' < "$token_resp" 2>/dev/null || head -c 200 "$token_resp"
            exit 1
          fi
          token="$(jq -r '.access_token // empty' < "$token_resp")"
          if [ -z "${token}" ]; then
            echo "::error::TI OAuth response did not contain access_token"
            exit 1
          fi
          # Mask the token in subsequent step logs.
          echo "::add-mask::${token}"
          echo "ti_token=${token}" >> "$GITHUB_OUTPUT"
          echo "Token acquired (value masked)."

      - name: Fetch TI catalog (one shot) (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' }}
        id: fetch
        env:
          TI_TOKEN: ${{ steps.token.outputs.ti_token }}
        run: |
          set -uo pipefail
          mkdir -p artifacts
          http_code="$(curl -sS -o artifacts/catalog.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TI_TOKEN}" \
            -H 'Accept: application/json' \
            "${TI_CATALOG_URL}")"
          size=$(stat -c%s artifacts/catalog.json 2>/dev/null || stat -f%z artifacts/catalog.json)
          echo "TI catalog HTTP ${http_code}, body size: ${size} bytes"
          if [ "${http_code}" = "429" ]; then
            echo "::error::TI full catalog quota exhausted. Do not rerun immediately. Wait at least 4 hours; safer 24 hours."
            echo ""
            echo "TI's /v2/store/products/catalog endpoint is officially rate-limited to 1 call every 4 hours / 6 calls per day."
            echo "Probe, capture, and this workflow all share the same quota — count any prior attempt against the budget."
            echo ""
            echo "Sanitized response head (no secrets):"
            head -c 500 artifacts/catalog.json || true
            exit 1
          fi
          if [ "${http_code}" != "200" ]; then
            echo "::error::TI catalog returned HTTP ${http_code}"
            head -c 500 artifacts/catalog.json
            exit 1
          fi
          if ! jq -e .catalog < artifacts/catalog.json > /dev/null 2>&1; then
            # Try alternate top-level keys (defensive).
            if jq -e .products < artifacts/catalog.json > /dev/null 2>&1; then
              jq '{catalog: .products}' < artifacts/catalog.json > artifacts/catalog.normalized.json
              mv artifacts/catalog.normalized.json artifacts/catalog.json
            else
              echo "::error::TI catalog JSON has no .catalog or .products array"
              exit 1
            fi
          fi
          total=$(jq '.catalog | length' < artifacts/catalog.json)
          echo "Parsed ${total} products"
          echo "body_byte_size=${size}" >> "$GITHUB_OUTPUT"
          echo "total_products=${total}" >> "$GITHUB_OUTPUT"

      - name: Split catalog into chunks (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' }}
        id: split
        env:
          CHUNK_SIZE: ${{ inputs.chunk_size }}
        run: |
          set -uo pipefail
          mkdir -p artifacts/chunks
          # Use Python for reliable streaming chunking.
          python3 - <<'PY'
          import json, os, math, uuid, datetime
          chunk_size = int(os.environ.get('CHUNK_SIZE') or '200')
          with open('artifacts/catalog.json') as f:
              data = json.load(f)
          products = data.get('catalog') or []
          total = len(products)
          total_chunks = math.ceil(total / chunk_size) if chunk_size > 0 else 0
          run_id = str(uuid.uuid4())
          captured_at = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.000Z')
          for i in range(total_chunks):
              start = i * chunk_size
              chunk = products[start:start + chunk_size]
              payload = {
                  'runId': run_id,
                  'capturedAt': captured_at,
                  'chunkIndex': i,
                  'totalChunks': total_chunks,
                  'products': chunk,
              }
              with open(f'artifacts/chunks/chunk_{i:04d}.json', 'w') as out:
                  json.dump(payload, out)
          with open('artifacts/run_meta.json', 'w') as out:
              json.dump({
                  'runId': run_id,
                  'capturedAt': captured_at,
                  'chunkSize': chunk_size,
                  'totalChunks': total_chunks,
                  'totalProducts': total,
                  'mode': 'real_catalog',
              }, out, indent=2)
          print(f'Wrote {total_chunks} chunks ({chunk_size} products/chunk) to artifacts/chunks/')
          PY
          run_id=$(jq -r .runId artifacts/run_meta.json)
          captured_at=$(jq -r .capturedAt artifacts/run_meta.json)
          total_chunks=$(jq -r .totalChunks artifacts/run_meta.json)
          total_products=$(jq -r .totalProducts artifacts/run_meta.json)
          echo "run_id=${run_id}"                >> "$GITHUB_OUTPUT"
          echo "captured_at=${captured_at}"      >> "$GITHUB_OUTPUT"
          echo "total_chunks=${total_chunks}"    >> "$GITHUB_OUTPUT"
          echo "total_products=${total_products}" >> "$GITHUB_OUTPUT"

      - name: POST each chunk to Worker (real_catalog only)
        id: post_chunks
        if: ${{ inputs.test_mode != 'synthetic_chunk' && inputs.dry_run != 'true' }}
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          TOTAL_CHUNKS: ${{ steps.split.outputs.total_chunks }}
          TOTAL_PRODUCTS: ${{ steps.split.outputs.total_products }}
        run: |
          set -uo pipefail
          FAILED_CHUNKS=0
          TOTAL_OPN_UPSERTED=0
          TOTAL_PRICED=0
          TOTAL_IN_STOCK=0
          TOTAL_OUT_OF_STOCK=0
          TOTAL_STMTS=0

          # Iterate chunks in lexical (chunk_0000.json …) order.
          for chunk_file in $(ls artifacts/chunks/chunk_*.json | sort); do
            response_file="$(mktemp)"
            http_code="$(curl -sS -o "$response_file" -w '%{http_code}' \
              -X POST \
              -H "X-Capture-Secret: ${CAPTURE_SECRET}" \
              -H 'Content-Type: application/json' \
              --data-binary "@${chunk_file}" \
              "${BASE_URL}/api/ti/universe/catalog/ingest-chunk")"

            if ! jq -e . < "$response_file" > /dev/null 2>&1; then
              echo "::error::${chunk_file} returned non-JSON (HTTP ${http_code})."
              head -c 300 "$response_file" || true
              FAILED_CHUNKS=$((FAILED_CHUNKS + 1))
              continue
            fi

            success=$(jq -r '.success // false' < "$response_file")
            chunk_idx=$(jq -r '.chunkIndex // -1' < "$response_file")
            attempted=$(jq -r '.attempted // 0' < "$response_file")
            upserted=$(jq -r '.opnRowsUpserted // 0' < "$response_file")
            priced=$(jq -r '.pricedOpns // 0' < "$response_file")
            in_stock=$(jq -r '.inStockOpns // 0' < "$response_file")
            out_of_stock=$(jq -r '.outOfStockOpns // 0' < "$response_file")
            stmts=$(jq -r '.sqlStatementsExecuted // 0' < "$response_file")
            errors_len=$(jq -r '(.errors // []) | length' < "$response_file")
            sub_errs_len=$(jq -r '(.subBatchErrors // []) | length' < "$response_file")

            TOTAL_OPN_UPSERTED=$((TOTAL_OPN_UPSERTED + upserted))
            TOTAL_PRICED=$((TOTAL_PRICED + priced))
            TOTAL_IN_STOCK=$((TOTAL_IN_STOCK + in_stock))
            TOTAL_OUT_OF_STOCK=$((TOTAL_OUT_OF_STOCK + out_of_stock))
            TOTAL_STMTS=$((TOTAL_STMTS + stmts))

            if [ "${success}" != "true" ] || [ "${errors_len}" != "0" ] || [ "${sub_errs_len}" != "0" ] || [ "${upserted}" != "${attempted}" ]; then
              echo "::warning::chunk ${chunk_idx} success=${success} attempted=${attempted} upserted=${upserted} errors=${errors_len} subBatchErrors=${sub_errs_len}"
              jq -c '{subBatchErrors, errors}' < "$response_file" || true
              FAILED_CHUNKS=$((FAILED_CHUNKS + 1))
            fi

            # Light pacing — 100ms between chunks.
            sleep 0.1
          done

          echo "─── Chunk POST totals ───"
          echo "  totalChunks (expected): ${TOTAL_CHUNKS}"
          echo "  failedChunks:           ${FAILED_CHUNKS}"
          echo "  opnRowsUpserted:        ${TOTAL_OPN_UPSERTED} / ${TOTAL_PRODUCTS}"
          echo "  sqlStatementsExecuted:  ${TOTAL_STMTS}"
          echo "  pricedOpns:             ${TOTAL_PRICED}"
          echo "  inStockOpns:            ${TOTAL_IN_STOCK}"
          echo "  outOfStockOpns:         ${TOTAL_OUT_OF_STOCK}"

          # Surface for downstream finalize/validate steps + final fail check.
          echo "failed_chunks=${FAILED_CHUNKS}"             >> "$GITHUB_OUTPUT"
          echo "opn_upserted=${TOTAL_OPN_UPSERTED}"         >> "$GITHUB_OUTPUT"
          echo "priced_opns=${TOTAL_PRICED}"                >> "$GITHUB_OUTPUT"
          echo "in_stock_opns=${TOTAL_IN_STOCK}"            >> "$GITHUB_OUTPUT"
          echo "out_of_stock_opns=${TOTAL_OUT_OF_STOCK}"    >> "$GITHUB_OUTPUT"
          echo "sql_statements=${TOTAL_STMTS}"              >> "$GITHUB_OUTPUT"

      - name: Finalize (rebuild GPN aggregates + insert snapshot run row) (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' && inputs.dry_run != 'true' }}
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          CAPTURED_AT: ${{ steps.split.outputs.captured_at }}
          BODY_BYTE_SIZE: ${{ steps.fetch.outputs.body_byte_size }}
        run: |
          set -uo pipefail
          payload=$(jq -nc \
            --arg capturedAt "$CAPTURED_AT" \
            --arg source 'ti_store_v2_catalog_chunked' \
            --argjson bodyByteSize "${BODY_BYTE_SIZE}" \
            '{capturedAt: $capturedAt, source: $source, bodyByteSize: $bodyByteSize, rawR2Key: null}')
          curl -sS -X POST \
            -H "X-Capture-Secret: ${CAPTURE_SECRET}" \
            -H 'Content-Type: application/json' \
            --data "${payload}" \
            "${BASE_URL}/api/ti/universe/catalog/finalize" \
            | jq -c .

      - name: Read /catalog/status + validate (real_catalog only)
        if: ${{ inputs.test_mode != 'synthetic_chunk' && inputs.dry_run != 'true' }}
        env:
          PARSED_PRODUCTS: ${{ steps.split.outputs.total_products }}
          FAILED_CHUNKS: ${{ steps.post_chunks.outputs.failed_chunks }}
          OPN_UPSERTED: ${{ steps.post_chunks.outputs.opn_upserted }}
        run: |
          set -uo pipefail
          status_file="$(mktemp)"
          curl -sS "${BASE_URL}/api/ti/universe/catalog/status" -o "$status_file"
          jq -c '{success, backend, opnCount, gpnCount, pricedOpnCount, inStockOpnCount, outOfStockOpnCount, latestCapturedAt}' < "$status_file"

          opn_count=$(jq -r '.opnCount // 0' < "$status_file")
          gpn_count=$(jq -r '.gpnCount // 0' < "$status_file")
          priced=$(jq -r '.pricedOpnCount // 0' < "$status_file")
          in_stock=$(jq -r '.inStockOpnCount // 0' < "$status_file")
          out_of_stock=$(jq -r '.outOfStockOpnCount // 0' < "$status_file")

          fail=0
          if [ "${FAILED_CHUNKS:-0}" != "0" ]; then
            echo "::error::Phase 23C.3 fail check: ${FAILED_CHUNKS} chunk(s) failed."
            fail=1
          fi
          if [ "${OPN_UPSERTED:-0}" -lt "${PARSED_PRODUCTS:-0}" ]; then
            echo "::error::Phase 23C.3 fail check: opnRowsUpserted (${OPN_UPSERTED}) < parsedProducts (${PARSED_PRODUCTS})."
            fail=1
          fi
          if [ "${opn_count}" != "${PARSED_PRODUCTS}" ]; then
            echo "::error::status.opnCount (${opn_count}) != parsedProducts (${PARSED_PRODUCTS})."
            fail=1
          fi
          if [ "${gpn_count}" -le 0 ]; then
            echo "::error::status.gpnCount (${gpn_count}) must be > 0 after finalize."
            fail=1
          fi
          if [ "${priced}" -le 0 ]; then
            echo "::error::status.pricedOpnCount (${priced}) must be > 0 — TI catalog always has priced rows."
            fail=1
          fi
          # in_stock + out_of_stock should be close to opn_count. 'Close'
          # = within 10% (catalog has some rows where quantity is unknown
          # / null and they belong to neither bucket).
          if_known=$((in_stock + out_of_stock))
          # Use awk for the percentage check (bash arithmetic is integer-only).
          ratio_ok=$(awk -v k="${if_known}" -v t="${opn_count}" 'BEGIN { if (t <= 0) { print 0 } else { print (k * 100 / t >= 90) ? 1 : 0 } }')
          if [ "${ratio_ok}" != "1" ]; then
            echo "::error::inStock (${in_stock}) + outOfStock (${out_of_stock}) = ${if_known} is < 90% of opnCount (${opn_count})."
            fail=1
          fi
          if [ "${fail}" = "1" ]; then
            echo "::error::Phase 23C.3 post-status validation failed; workflow exiting red."
            exit 1
          fi
          echo "Phase 23C.3 post-status validation passed."

      - name: Upload chunk artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ti-catalog-chunks-failure
          path: artifacts/run_meta.json
          if-no-files-found: warn
          retention-days: 3
