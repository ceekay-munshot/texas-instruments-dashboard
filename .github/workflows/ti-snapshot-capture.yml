name: TI Source Snapshot Capture

# Daily scheduled capture of TI source snapshots.
# Runs once a day at 07:30 UTC. Can also be invoked manually.
#
# What it does (in order, Phase 16A):
#   1. POST /api/snapshots/mouser/capture   — full Mouser daily backbone (free, 28 categories)
#   2. POST /api/snapshots/capture          — Nexar representative-basket rotating sample (≤4 calls)
#
# Both endpoints share the same SNAPSHOT_CAPTURE_SECRET. Mouser is captured
# first because it is the free full backbone — even if Nexar fails the
# dashboard still gets a complete daily snapshot. Nexar is captured second so
# its quota of 4 calls/day is always preserved for corroboration.
#
# Required GitHub Actions secret:
#   SNAPSHOT_CAPTURE_SECRET — must match the same-named secret stored on the
#   Cloudflare Pages project (Settings → Variables and Secrets → Production).
#
# Treated as success for either capture:
#   - response.success === true
#   - response.status === "already_exists_for_today" (idempotent)

on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ti-snapshot-capture
  cancel-in-progress: false

jobs:
  capture:
    name: POST Mouser then Nexar capture
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate SNAPSHOT_CAPTURE_SECRET is configured
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
        run: |
          if [ -z "${CAPTURE_SECRET:-}" ]; then
            echo "::error::Repository secret SNAPSHOT_CAPTURE_SECRET is not set."
            echo "Add it under: Settings → Secrets and variables → Actions → New repository secret."
            echo "It must match the same-named secret on the Cloudflare Pages project."
            exit 1
          fi
          echo "Secret is configured (value not printed)."

      - name: Capture Mouser snapshot (free full backbone)
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          CAPTURE_URL: https://texas-instruments-dashboard-final.pages.dev/api/snapshots/mouser/capture
        run: |
          set -uo pipefail

          response_file="$(mktemp)"

          # Single POST. The secret is passed as a request header — never echoed
          # by this workflow. GitHub Actions also auto-masks any secret if it
          # somehow leaks into stdout/stderr, but this script does not log it.
          http_status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "X-Capture-Secret: ${CAPTURE_SECRET}" \
            "${CAPTURE_URL}")"

          echo "Mouser capture HTTP status: ${http_status}"

          if ! jq -e . < "$response_file" > /dev/null 2>&1; then
            echo "::error::Mouser capture response was not valid JSON (HTTP ${http_status})."
            head -c 500 "$response_file" || true
            exit 1
          fi

          # Print only safe, non-secret fields from the response.
          echo "Mouser response (sanitized):"
          jq -c '{
            success, status, message,
            snapshotDate, key, overwritten,
            source, noPaidQuotaRequired,
            categoryCount, skuCount, callsUsed,
            okCategoryCount, rateLimitedCategoryCount, errorCategoryCount,
            canonicalCoverageSummary,
            storageConfigured, captureSecretConfigured,
            schemaVersion
          }' < "$response_file"

          status="$(jq -r '.status // empty' < "$response_file")"
          success="$(jq -r '.success // empty' < "$response_file")"

          if [ "${status}" = "already_exists_for_today" ]; then
            echo "ℹ︎ Mouser snapshot already captured for today — idempotent skip."
          elif [ "${success}" = "true" ]; then
            echo "Mouser snapshot captured."
          else
            case "${status}" in
              unauthorized)
                echo "::error::Mouser capture refused (unauthorized) — verify SNAPSHOT_CAPTURE_SECRET."
                exit 1
                ;;
              snapshot_storage_not_configured)
                echo "::error::SOURCE_SNAPSHOTS_KV namespace is not bound on the Cloudflare Pages project."
                exit 1
                ;;
              capture_secret_not_configured)
                echo "::error::SNAPSHOT_CAPTURE_SECRET is not set on the Cloudflare Pages project."
                exit 1
                ;;
              mouser_not_configured)
                echo "::error::MOUSER_API_KEY is not set on the Cloudflare Pages project."
                exit 1
                ;;
              *)
                echo "::error::Unexpected Mouser response — success=${success} status=${status} http=${http_status}"
                exit 1
                ;;
            esac
          fi

      - name: Capture Nexar snapshot (rotating corroboration, ≤4 calls)
        env:
          CAPTURE_SECRET: ${{ secrets.SNAPSHOT_CAPTURE_SECRET }}
          CAPTURE_URL: https://texas-instruments-dashboard-final.pages.dev/api/snapshots/capture
        run: |
          set -uo pipefail

          response_file="$(mktemp)"

          http_status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "X-Capture-Secret: ${CAPTURE_SECRET}" \
            "${CAPTURE_URL}")"

          echo "Nexar capture HTTP status: ${http_status}"

          if ! jq -e . < "$response_file" > /dev/null 2>&1; then
            echo "::error::Nexar capture response was not valid JSON (HTTP ${http_status})."
            head -c 500 "$response_file" || true
            exit 1
          fi

          echo "Nexar response (sanitized):"
          jq -c '{
            success, status, message,
            snapshotDate, key, overwritten,
            categoryCount, skuCount,
            callsUsed, maxCalls,
            storageConfigured, captureSecretConfigured, nexarConfigured,
            schemaVersion
          }' < "$response_file"

          status="$(jq -r '.status // empty' < "$response_file")"
          success="$(jq -r '.success // empty' < "$response_file")"

          if [ "${status}" = "already_exists_for_today" ]; then
            echo "ℹ︎ Nexar snapshot already captured for today — idempotent skip."
            exit 0
          fi

          case "${status}" in
            unauthorized)
              echo "::error::Nexar capture refused (unauthorized) — verify SNAPSHOT_CAPTURE_SECRET."
              exit 1
              ;;
            snapshot_storage_not_configured)
              echo "::error::SOURCE_SNAPSHOTS_KV namespace is not bound on the Cloudflare Pages project."
              exit 1
              ;;
            capture_secret_not_configured)
              echo "::error::SNAPSHOT_CAPTURE_SECRET is not set on the Cloudflare Pages project."
              exit 1
              ;;
            nexar_not_configured)
              echo "::error::NEXAR_CLIENT_ID / NEXAR_CLIENT_SECRET are not set on the Cloudflare Pages project."
              exit 1
              ;;
          esac

          if [ "${success}" = "true" ]; then
            echo "Nexar snapshot captured successfully."
            exit 0
          fi

          echo "::error::Unexpected Nexar response — success=${success} status=${status} http=${http_status}"
          exit 1
